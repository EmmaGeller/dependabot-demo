---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/ruby"
    schedule:
      interval: "weekly"
  - package-ecosystem: npm
    directory: "javascript"
    ignore:
        - dependency-name: "jstat"
    schedule:
      interval: "weekly"
  - package-ecosystem: bundler
    directory: "/ruby"
    schedule:
      interval: "weekly"
