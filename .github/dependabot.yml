---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/ruby"
    schedule:
      interval: "weekly"
  - package-ecosystem: npm
    directory: "/javascript"
    ignore:
      - dependency-name: "lodash@*"
        versions: [">=4.17.20"]
    schedule:
      interval: "weekly"
  - package-ecosystem: bundler
    directory: "/ruby"
    schedule:
      interval: "weekly"
